name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PreOddsApi.sln

      - name: Build
        run: dotnet build PreOddsApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PreOddsApi.WebApi.Tests/PreOddsApi.WebApi.Tests.csproj --configuration Release --no-build --verbosity normal
