# Production stack for TipsWall on a single VPS.
#
# Images are pulled from GHCR (built by .github/workflows/deploy.yml on
# every push to main). The deploy script on the VPS does:
#   docker compose --env-file .env pull
#   docker compose --env-file .env up -d
#
# Postgres data lives on the Hetzner Volume mounted at
# /mnt/tipswall-data on the host. Set POSTGRES_DATA_DIR in .env to
# override (e.g. local-disk for dev).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-preodds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-preodds}
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-preodds} -d ${POSTGRES_DB:-preodds}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Tune Postgres for a 4 GB host (GoDaddy Standard VPS, 2 vCPU). The
    # rest of the budget goes to the four .NET services + page cache; a
    # runaway query at these numbers won't push the box into swap.
    # Raise shared_buffers (towards 25% of RAM) when moving to a bigger
    # plan (e.g. 2GB on an 8GB host, 4GB on 16GB).
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1500MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=40
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
    deploy:
      resources:
        limits:
          # Host is 4 GB (not 8 — `free -h` showed Mem: 3.8Gi total on
          # 2026-05-17). The earlier 2560M bump overcommitted relative
          # to the real budget; combined with the worker bump it pushed
          # the cluster past host RAM and Linux OOM-killed postgres
          # back into a recovery cycle. Revert to 1500M; with
          # raw_payloads archival now disabled (see
          # SportMonksSync__StoreRawPayloads below + the code gate in
          # SportMonksSyncRunner.cs), the original trigger for the OOM
          # is gone and 1500M is plenty for steady-state working set.
          memory: 1500M

  migrator:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-migrator:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
    # Mount the migrations directory so the migrator sees current SQL
    # without needing a rebuild for SQL-only changes.
    volumes:
      - ./database/postgres:/app/database/postgres:ro

  webapi:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-webapi:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      # Command Timeout=1800s (30 min) so the admin /analytics/snapshot/rebuild
      # endpoint can sit through the full 365-day finalizer +
      # season-team-stats + season-player-stats + snapshot pipeline.
      # Bumped from 600s after the window-codes refactor added the
      # season_current + season_2y windows on top of the existing 5
      # time-based ones — the new SQL produces ~3M snapshot rows and
      # the pipeline now needs ~12-15 minutes end-to-end during a full
      # rebuild. Regular hot-path reads (signals, fixtures, odds-rates)
      # all finish well under 1s so the bumped ceiling is a safety net,
      # not a regression risk.
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=1800"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=1800"
      PREODDS_JWT_SECRET: ${PREODDS_JWT_SECRET:?required}
      PREODDS_INTERNAL_API_KEY: ${PREODDS_INTERNAL_API_KEY:-}
      Authentication__Issuer: ${AUTH_ISSUER:?required}
      Authentication__Audience: ${AUTH_AUDIENCE:?required}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0:?required}
      # Social sign-in: missing values keep the buttons hidden client-
      # side and return a clear "not configured" 503 server-side.
      PREODDS_APPLE_CLIENT_ID: ${PREODDS_APPLE_CLIENT_ID:-}
      PREODDS_GOOGLE_CLIENT_ID_IOS: ${PREODDS_GOOGLE_CLIENT_ID_IOS:-}
      PREODDS_GOOGLE_CLIENT_ID_ANDROID: ${PREODDS_GOOGLE_CLIENT_ID_ANDROID:-}
      PREODDS_GOOGLE_CLIENT_ID_WEB: ${PREODDS_GOOGLE_CLIENT_ID_WEB:-}
      # SMTP creds — AuthController issues the email-verify + password-
      # reset links through IEmailService. Without these the service
      # logs a "MAIL_PASSWORD not set" warning and silently no-ops, so
      # the signup→verify mail never actually leaves the container.
      # Same GoDaddy values the worker uses for nightly snapshot alerts;
      # one .env, one mailbox.
      MAIL_HOST: ${MAIL_HOST:-smtpout.secureserver.net}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-tipswall@tipswall.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-tipswall@tipswall.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TipsWall}
      # Program.cs reads SENTRY_DSN directly via Environment.GetEnvironmentVariable
      # (the double-underscore IConfiguration form Sentry__Dsn was inert).
      # Empty string → SDK no-ops, so this is safe to commit even before
      # the user fills SENTRY_DSN_BACKEND in .env.
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 384M

  worker-core:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-core:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
      # WorkerObservability.cs reads SENTRY_DSN directly. Empty string
      # → Serilog Sentry sink no-ops, so safe even before the DSN is
      # filled in .env. Wire all three workers so unhandled exceptions
      # (like the OOM / 429 cascades we hit on 2026-05-13) ship to
      # Sentry once the user provisions a project.
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
    deploy:
      resources:
        limits:
          memory: 384M

  worker-football:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-football:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      # Command Timeout=1800s (30 min) — covers both the backlog
      # raw_payloads INSERT (multi-MB SportMonks responses) AND the
      # nightly 03:00 UTC snapshot rebuild which now runs the wider
      # season-window SQL and takes ~12-15 min after the window-codes
      # refactor. Earlier 180s was tight even before, 1800s is the
      # same ceiling the webapi uses for the manual rebuild path.
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=1800"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=1800"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
      # WorkerObservability.cs reads SENTRY_DSN directly. Empty string
      # → Serilog Sentry sink no-ops, so safe even before the DSN is
      # filled in .env. Wire all three workers so unhandled exceptions
      # (like the OOM / 429 cascades we hit on 2026-05-13) ship to
      # Sentry once the user provisions a project.
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
      # Nightly snapshot failure alert: GoDaddy Professional Email SMTP.
      # When MAIL_PASSWORD is unset the email service no-ops with a
      # warning so unconfigured environments don't crash. The recipient
      # falls back to ethemserce@gmail.com when NIGHTLY_SNAPSHOT_ADMIN_EMAIL
      # is empty.
      MAIL_HOST: ${MAIL_HOST:-smtpout.secureserver.net}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-tipswall@tipswall.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-tipswall@tipswall.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TipsWall Ops}
      NIGHTLY_SNAPSHOT_ADMIN_EMAIL: ${NIGHTLY_SNAPSHOT_ADMIN_EMAIL:-ethemserce@gmail.com}
      # xG ingestion is currently unbounded (~125k rows, paged in
      # /expected/fixtures). It was burning the SportMonks 3000/hr quota
      # and starving the rest of the pulse + nightly chain. Keep it off
      # at the env layer until the worker is taught a date window.
      SportMonksExpectedXgSync__Enabled: "false"
      # /transfers/latest is also unbounded — ~1800+ pages per nightly
      # run, blocks fixture-backlog from running. Mobile UI doesn't use
      # transfer data; sidelined is what we need (and it ships from a
      # different endpoint). Disable until a windowed transfer call lands.
      SportMonksTransferSidelinedSync__SyncLatestTransfers: "false"
      # /players + /coaches + /rivals are reference-data dumps. Players
      # alone is ~89k rows per run, but it ships canonical squad rosters
      # (football.team_squads) which the team-detail squad tab and the
      # PlayerPeekSheet need. Without it those views render empty.
      # The worker enforces a weekly cadence (PlayerReferenceIntervalSeconds
      # default = 604800), so steady-state cost is one heavy run per
      # week, not every nightly cycle.
      SportMonksPlayerReferenceSync__Enabled: "true"
      # NOTE: SportMonksFixtureBacklogSync__DaysForward/DaysBack used to
      # cap the window at 5/1 here because the single-shot multi-day
      # call was OOM'ing. ExecuteFixtureWindow now loops per-day, so the
      # backlog can run at the appsettings default (14 fwd / 2 back).
      #
      # Season backfill — one-shot historical sync triggered manually
      # via env. When Enabled=true and a valid From/To window is set,
      # the worker walks the past day-by-day on the live tick (2 days
      # per tick by default), checkpointing each day so a restart
      # resumes. After the window completes, the outcome finalizer
      # + odd-analysis snapshot rebuild fire automatically.
      # Flip back to false (or wipe sync.job_runs rows for the window)
      # to disable / re-run.
      SeasonBackfill__Enabled: ${SEASON_BACKFILL_ENABLED:-false}
      SeasonBackfill__FromDate: ${SEASON_BACKFILL_FROM:-}
      SeasonBackfill__ToDate: ${SEASON_BACKFILL_TO:-}
      SeasonBackfill__DaysPerTick: ${SEASON_BACKFILL_DAYS_PER_TICK:-2}
      # Pulse OOM fix (2026-05-17): kill the entire fixture-timeline
      # sync. SyncTrends=false alone wasn't enough because the gate is
      # `Enabled AND (SyncTrends OR SyncPressureTrends OR SyncCommentaries)` —
      # production has SyncPressureTrends=true, so the writer was still
      # invoked and SportMonks's `pressure` include populates the same
      # `fixture.Trends` bucket the trend upsert reads from. Disabling
      # at the Enabled gate stops every include + writer call cold.
      # Mobile UI doesn't surface trend / pressure / commentary data;
      # re-enable once the upsert is streamed instead of buffered.
      SportMonksFixtureTimelineSync__Enabled: "false"
      # Archival of every SportMonks response into sync.raw_payloads was
      # the smoking gun for the Postgres OOM-kill / recovery cycles on
      # 2026-05-17: a single multi-MB JSONB insert pushed the DB over
      # its memory ceiling, Linux SIGKILL'd the backend, and every
      # parallel worker tick failed with 57P03 during the ~5s recovery.
      # sync.raw_payloads is debug-only — no production read path uses
      # it. Disable archival until the table is partitioned / dropped.
      SportMonksSync__StoreRawPayloads: "false"
      # MatchFacts is paginated per-fixture (sometimes 14+ pages each)
      # and was monopolising the HttpClient connection pool, starving
      # the live tier of its `livescores/latest` slot. With match-facts
      # off, the live tick wakes up on schedule. Mobile UI surfaces
      # match facts only in a niche tab (acceptable temporary cost).
      # Re-enable once the pagination is windowed / rate-paced.
      SportMonksMatchFactsSync__Enabled: "false"
      # Backlog window — was 2 back / 14 forward (16 days × multi-page
      # SportMonks calls per pulse cycle). Even at 1 day per tick, the
      # accumulated paginations were keeping HttpClient busy and pulse
      # tier from finishing in a reasonable time. Tighten to 1 back /
      # 3 forward — enough to refresh recent + near-future fixtures
      # without a 16-day fan-out. Re-widen once the worker batches
      # writes more efficiently.
      SportMonksFixtureBacklogSync__DaysBack: "1"
      SportMonksFixtureBacklogSync__DaysForward: "3"
      # Inplay odds — product decision (2026-05-17): we don't surface
      # live odds in the UI at all, the user's analysis is based on
      # pre-match odds and stays valid once the match is underway.
      # Disabling the entire inplay sync removes the HTTP round-trip
      # AND the per-fixture upsert into odds.inplay_odds_current,
      # freeing live-tick budget and DB write capacity. Re-enable if
      # we ever ship a live-odds view.
      SportMonksInplayOddsSync__Enabled: "false"
      # Outcome finalizer was the smoking gun for a 26-minute Postgres
      # CPU lockup on 2026-05-17: the 36h lookback × every bookmaker ×
      # every market × every outcome on every FT fixture is a massive
      # join that compounded when many fixtures flipped to FT in one
      # batch (manual catch-up SQL). Disable for now; mobile-side coupon
      # settlement still works because the mobile defensive gate
      # (decideSettlement) only trusts `winning` once the fixture state
      # bucket is `finished` — the stamp is a nice-to-have, not a hard
      # requirement. Re-enable after the finalizer SQL is windowed by
      # bookmaker filter + lookback shrunk.
      OddOutcomeFinalize__Enabled: "false"
      # Only persist prematch odds for bookmaker 2 — the single
      # bookmaker the mobile UI defaults to and the only one analysis
      # is built against. SportMonksPrematchOddsWriter reads this list
      # at startup and silently drops every row from other bookmakers,
      # cutting the write volume by 10-20x and shrinking the dataset
      # the outcome finalizer would need to scan once it's re-enabled.
      # Add more ids ("__1=5") if a second bookmaker becomes relevant
      # to the analysis pipeline.
      SportMonksPrematchOddsSync__AllowedBookmakerIds__0: "2"
    deploy:
      resources:
        limits:
          # Host is 4 GB — see postgres comment. Reverted from 2048M to
          # 1280M now that raw_payloads archival is disabled (was the
          # main allocator behind pulse-tier .NET OOMs; JSON serialize
          # of multi-MB responses + immediate JSONB insert was peaking
          # heap pressure). 1280M is the pre-incident steady-state and
          # fits inside the real host budget alongside postgres 1.5G
          # + 3×384M small services + 128M caddy ≈ 3.8G total.
          memory: 1280M

  worker-odds:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-odds:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
      # WorkerObservability.cs reads SENTRY_DSN directly. Empty string
      # → Serilog Sentry sink no-ops, so safe even before the DSN is
      # filled in .env. Wire all three workers so unhandled exceptions
      # (like the OOM / 429 cascades we hit on 2026-05-13) ship to
      # Sentry once the user provisions a project.
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
    deploy:
      resources:
        limits:
          memory: 384M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - webapi
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/legal:/srv/legal:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:?required}
      # Marketing / legal host(s). Set to "tipswall.com www.tipswall.com"
      # once DNS is pointing at this VPS so Caddy can provision certs and
      # serve the Play-Store-referenced /privacy and /terms URLs. Leave
      # unset (or "dummy.invalid") to keep the legal pages only on the
      # API host while DNS still points elsewhere.
      LEGAL_DOMAINS: ${LEGAL_DOMAINS:-dummy.invalid}
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
