# Production stack for TipsWall on a single VPS.
#
# Images are pulled from GHCR (built by .github/workflows/deploy.yml on
# every push to main). The deploy script on the VPS does:
#   docker compose --env-file .env pull
#   docker compose --env-file .env up -d
#
# Postgres data lives on the Hetzner Volume mounted at
# /mnt/tipswall-data on the host. Set POSTGRES_DATA_DIR in .env to
# override (e.g. local-disk for dev).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-preodds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-preodds}
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-preodds} -d ${POSTGRES_DB:-preodds}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Tune Postgres for a 4 GB host (GoDaddy Standard VPS, 2 vCPU). The
    # rest of the budget goes to the four .NET services + page cache; a
    # runaway query at these numbers won't push the box into swap.
    # Raise shared_buffers (towards 25% of RAM) when moving to a bigger
    # plan (e.g. 2GB on an 8GB host, 4GB on 16GB).
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1500MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=40
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 1280M

  migrator:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-migrator:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
    # Mount the migrations directory so the migrator sees current SQL
    # without needing a rebuild for SQL-only changes.
    volumes:
      - ./database/postgres:/app/database/postgres:ro

  webapi:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-webapi:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      PREODDS_JWT_SECRET: ${PREODDS_JWT_SECRET:?required}
      PREODDS_INTERNAL_API_KEY: ${PREODDS_INTERNAL_API_KEY:-}
      Authentication__Issuer: ${AUTH_ISSUER:?required}
      Authentication__Audience: ${AUTH_AUDIENCE:?required}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0:?required}
      # Social sign-in: missing values keep the buttons hidden client-
      # side and return a clear "not configured" 503 server-side.
      PREODDS_APPLE_CLIENT_ID: ${PREODDS_APPLE_CLIENT_ID:-}
      PREODDS_GOOGLE_CLIENT_ID_IOS: ${PREODDS_GOOGLE_CLIENT_ID_IOS:-}
      PREODDS_GOOGLE_CLIENT_ID_ANDROID: ${PREODDS_GOOGLE_CLIENT_ID_ANDROID:-}
      PREODDS_GOOGLE_CLIENT_ID_WEB: ${PREODDS_GOOGLE_CLIENT_ID_WEB:-}
      Sentry__Dsn: ${SENTRY_DSN_BACKEND:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 384M

  worker-core:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-core:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: 384M

  worker-football:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-football:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      # Command Timeout=180 because the backlog raw_payloads INSERT can
      # carry multi-MB SportMonks responses; the default 30s was hitting
      # NpgsqlException "Timeout during reading attempt" during streaming.
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=180"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD};Command Timeout=180"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
      # xG ingestion is currently unbounded (~125k rows, paged in
      # /expected/fixtures). It was burning the SportMonks 3000/hr quota
      # and starving the rest of the pulse + nightly chain. Keep it off
      # at the env layer until the worker is taught a date window.
      SportMonksExpectedXgSync__Enabled: "false"
      # /transfers/latest is also unbounded — ~1800+ pages per nightly
      # run, blocks fixture-backlog from running. Mobile UI doesn't use
      # transfer data; sidelined is what we need (and it ships from a
      # different endpoint). Disable until a windowed transfer call lands.
      SportMonksTransferSidelinedSync__SyncLatestTransfers: "false"
    deploy:
      resources:
        limits:
          memory: 1536M

  worker-odds:
    image: ghcr.io/${GHCR_OWNER:?required}/tipswall-worker-odds:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PREODDS_POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__PreOddsApiPostgresDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-preodds};Username=${POSTGRES_USER:-preodds};Password=${POSTGRES_PASSWORD}"
      SportMonks__ApiToken: ${SPORTMONKS_API_TOKEN:?required}
      WORKER_HEALTH_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: 384M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - webapi
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:?required}
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
